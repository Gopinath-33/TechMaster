<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Enrollment</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#F0FDFA;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .enroll-container{
            background:white;
            width:400px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .enroll-container h1{
            text-align:center;
            margin-bottom:10px;
            color:#14B8A6;
        }

        .enroll-container p{
            text-align:center;
            margin-bottom:20px;
            color:gray;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#14B8A6;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0F766E;
        }
    </style>
</head>
<body>

<div class="enroll-container">
    <h1>Enroll Now</h1>
    <p>Join your favorite course today</p>

    <form action="index.html">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="tel" placeholder="Phone Number" required>

        <select required>
            <option>Select Course</option>
            <option>Python</option>
            <option>Web Development</option>
            <option>JavaScript</option>
            <option>React JS</option>
            <option>Data Science</option>
        </select>

        <button type="submit" >Enroll Now</button>
    </form>
</div>

</body>
</html>
